<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeGoal</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div class="logo">
            🎯⏰ TimeGoal
        </div>

        <button id="themeButton">
            🌙
        </button>
    </header>

    <div class="container">

        <h1>Compte à rebours</h1>

        <div class="champDeSaisie">

            <input
                id="hours"
                type="number"
                min="0"
                placeholder="Heures">

            <input
                id="minutes"
                type="number"
                min="0"
                max="59"
                placeholder="Minutes">

            <input
                id="seconds"
                type="number"
                min="0"
                max="59"
                placeholder="Secondes">

        </div>

        <div class="boutons">

            <button id="startButton">
                ▷
            </button>

            <button id="pauseButton">
                ⏸
            </button>

            <button id="playButton">
                ▶
            </button>

            <button id="restartButton">
                ↺
            </button>

        </div>

        <div id="timer">
            00:00:00
        </div>

    </div>

    <script>

        //--------------------------------------
        // FORMAT HH:MM:SS
        //--------------------------------------

        function format2(nombre)
        {
            return String(nombre).padStart(2, "0")
        }

        //--------------------------------------
        // TIMER
        //--------------------------------------

        function startTimer()
        {
            if (secondsConvert > 0)
            {
                secondsConvert--
            }
            else
            {
                clearInterval(idInterval)

                startButton.disabled = false
                pauseButton.disabled = true
                playButton.disabled = true
            }

            hours = Math.floor(secondsConvert / 3600)

            minutes =
                Math.floor(
                    (secondsConvert % 3600) / 60
                )

            seconds =
                secondsConvert % 60

            timer.textContent =
                format2(hours) + ":" +
                format2(minutes) + ":" +
                format2(seconds)
        }

        //--------------------------------------
        // VARIABLES
        //--------------------------------------

        let startButton =
            document.getElementById("startButton")

        let pauseButton =
            document.getElementById("pauseButton")

        let playButton =
            document.getElementById("playButton")

        let restartButton =
            document.getElementById("restartButton")

        let timer =
            document.getElementById("timer")

        let idInterval

        let secondsConvert = 0

        let hours
        let minutes
        let seconds

        pauseButton.disabled = true
        playButton.disabled = true

        //--------------------------------------
        // DEMARRER
        //--------------------------------------

        startButton.addEventListener(
            "click",
            function ()
            {
                hours =
                    document.getElementById("hours").value

                minutes =
                    document.getElementById("minutes").value

                seconds =
                    document.getElementById("seconds").value

                hours =
                    hours === ""
                    ? 0
                    : parseInt(hours)

                minutes =
                    minutes === ""
                    ? 0
                    : parseInt(minutes)

                seconds =
                    seconds === ""
                    ? 0
                    : parseInt(seconds)

                minutes =
                    Math.max(
                        0,
                        Math.min(minutes, 59)
                    )

                seconds =
                    Math.max(
                        0,
                        Math.min(seconds, 59)
                    )

                secondsConvert =
                    hours * 3600 +
                    minutes * 60 +
                    seconds

                if (secondsConvert <= 0)
                {
                    return
                }

                startButton.disabled = true
                pauseButton.disabled = false

                timer.textContent =
                    format2(hours) + ":" +
                    format2(minutes) + ":" +
                    format2(seconds)

                idInterval =
                    setInterval(
                        startTimer,
                        1000
                    )
            }
        )

        //--------------------------------------
        // PAUSE
        //--------------------------------------

        pauseButton.addEventListener(
            "click",
            function ()
            {
                clearInterval(idInterval)

                pauseButton.disabled = true
                playButton.disabled = false
            }
        )

        //--------------------------------------
        // REPRENDRE
        //--------------------------------------

        playButton.addEventListener(
            "click",
            function ()
            {
                playButton.disabled = true
                pauseButton.disabled = false

                idInterval =
                    setInterval(
                        startTimer,
                        1000
                    )
            }
        )

        //--------------------------------------
        // RESET
        //--------------------------------------

        restartButton.addEventListener(
            "click",
            function ()
            {
                clearInterval(idInterval)

                secondsConvert = 0

                hours = 0
                minutes = 0
                seconds = 0

                timer.textContent =
                    "00:00:00"

                startButton.disabled = false
                pauseButton.disabled = true
                playButton.disabled = true
            }
        )

        //--------------------------------------
        // MODE SOMBRE
        //--------------------------------------

        const themeButton =
            document.getElementById("themeButton")

        themeButton.addEventListener(
            "click",
            function ()
            {
                document.body.classList.toggle(
                    "dark-mode"
                )

                if (
                    document.body.classList.contains(
                        "dark-mode"
                    )
                )
                {
                    themeButton.textContent = "☀️"
                }
                else
                {
                    themeButton.textContent = "🌙"
                }
            }
        )

    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compte à rebours</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background: #1e1e2f;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: #2b2b42;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        h1 {
            margin-bottom: 25px;
        }

        .inputs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            text-align: center;
            font-size: 16px;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        #startButton {
            background: #4CAF50;
            color: white;
        }

        #startButton:hover {
            background: #43a047;
        }

        #stopButton {
            background: #f44336;
            color: white;
        }

        #stopButton:hover {
            background: #e53935;
        }

        #timerDisplay {
            font-size: 3rem;
            font-weight: bold;
            letter-spacing: 3px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Compte à rebours</h1>

    <div class="inputs">
        <input id="hours" type="number" min="0" placeholder="Heures">
        <input id="minutes" type="number" min="0" max="59" placeholder="Minutes">
        <input id="seconds" type="number" min="0" max="59" placeholder="Secondes">
    </div>

    <div class="buttons">
        <button id="startButton">Démarrer</button>
        <button id="stopButton">Arrêter</button>
    </div>

    <div id="timerDisplay">00:00:00</div>
</div>

<script>
    const startButton = document.getElementById("startButton");
    const stopButton = document.getElementById("stopButton");
    const timerDisplay = document.getElementById("timerDisplay");

    let intervalId = null;

    function formatTime(totalSeconds) {
        const hours = Math.floor(totalSeconds / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;

        return [
            String(hours).padStart(2, "0"),
            String(minutes).padStart(2, "0"),
            String(seconds).padStart(2, "0")
        ].join(":");
    }

    startButton.addEventListener("click", () => {

        // Empêche de créer plusieurs setInterval
        clearInterval(intervalId);

        const hours = Number(document.getElementById("hours").value) || 0;
        const minutes = Math.min(Number(document.getElementById("minutes").value) || 0, 59);
        const seconds = Math.min(Number(document.getElementById("seconds").value) || 0, 59);

        let totalSeconds = hours * 3600 + minutes * 60 + seconds;

        if (totalSeconds <= 0) {
            return;
        }

        timerDisplay.textContent = formatTime(totalSeconds);

        intervalId = setInterval(() => {

            totalSeconds--;

            timerDisplay.textContent = formatTime(totalSeconds);

            if (totalSeconds <= 0) {
                clearInterval(intervalId);
                timerDisplay.textContent = "00:00:00";
                alert("Temps écoulé !");
            }

        }, 1000);
    });

    stopButton.addEventListener("click", () => {
        clearInterval(intervalId);
    });

</script>

</body>
</html>

<!DOCTYPE html>
<html>
    <head>
        <title>Time Goal</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <h1>Compte à rebours</h1>

        <div class = "champDeSaisie">
            <input id = "hours" type="number" min = "0" placeholder="Heures">
            <input id = "minutes" type="number" min = "0" max ="59" placeholder="Minutes">
            <input id = "seconds" type="number" min = "0" max ="59" placeholder="Secondes">
        </div>
        
        <div class = "boutons">
            <button id = "startButton">▷</button>
            <button id = "pauseButton">⏸</button>
            <button id = "playButton">▶</button>
            <button id = "restartButton">↺</button>
        </div>
        

        <div id = "timer">
            00:00:00
        </div>

        <script>
            //--------------------------------------
            /*FONCTION DE DEMARRAGE DU TIMER*/
            //--------------------------------------
            function startTimer()
            {
                //console.log("Conversion en secondes: ", secondsConvert)
                if (secondsConvert > 0)
                {
                    secondsConvert--
                }
                else if (secondsConvert === 0)
                {
                    clearInterval(idInterval)
                }
                
                hours = Math.floor(secondsConvert / 3600)
                minutes = Math.floor((secondsConvert % 3600) / 60)
                seconds = (secondsConvert % 3600) % 60

                console.log("Heures:", hours, " Minutes:", minutes, " Secondes:", seconds)
                timer.textContent = format2(hours) + ":" + format2(minutes) + ":" + format2(seconds)
            }

            //--------------------------------------
            /*FONCTION DE FORMATAGE HORAIRE*/
            //--------------------------------------
            function format2(nombre)
            {
                return String(nombre).padStart(2,"0")
            }

            //--------------------------------------
            /*CREATION DE VARIABLES*/
            //--------------------------------------
            let startButton = document.getElementById("startButton")
            let pauseButton = document.getElementById("pauseButton")
            let playButton = document.getElementById("playButton")
            let restartButton = document.getElementById("restartButton")
            let idInterval
            let secondsConvert
            let hours
            let minutes
            let seconds
            let timer

            playButton.disabled = true
            pauseButton.disabled = true

            startButton.addEventListener("click", 
            function()
            {
                startButton.disabled = true
                pauseButton.disabled = false
                hours = document.getElementById("hours").value
                minutes = document.getElementById("minutes").value
                seconds = document.getElementById("seconds").value
                timer = document.getElementById("timer")
                
                if (hours === "")
                {
                    hours = 0
                }
                else
                {
                    hours = parseInt(hours)
                }

                if (minutes === "")
                {
                    minutes = 0
                }
                else
                {
                    minutes = parseInt(minutes)
                }

                if (seconds === "")
                {
                    seconds = 0
                }
                else
                {
                    seconds = parseInt(seconds)
                }

                minutes = Math.max(0,Math.min(minutes, 59))
                seconds = Math.max(0,Math.min(seconds, 59))

                secondsConvert = hours*3600 + minutes*60 + seconds

                console.log("Démarrer")
                //--------------------------------------
                /*DECOMPTE DU TEMPS*/
                //--------------------------------------
                idInterval = setInterval(startTimer,1000)
                
            })

            pauseButton.addEventListener("click", function()
            {
                playButton.disabled = false
                pauseButton.disabled = true
                console.log("Pause")
                clearInterval(idInterval)
                console.log("Heures:", hours, " Minutes:", minutes, " Secondes:", seconds)
                timer.textContent = format2(hours) + ":" + format2(minutes) + ":" + format2(seconds)
            })

            playButton.addEventListener("click", function()
            {
                console.log("Play")
                playButton.disabled = true
                pauseButton.disabled = false
                //--------------------------------------
                /*DECOMPTE DU TEMPS*/
                //--------------------------------------
                idInterval = setInterval(startTimer,1000)
            })

            restartButton.addEventListener("click", function()
            {
                clearInterval(idInterval)

                startButton.disabled = false
                playButton.disabled = true
                pauseButton.disabled = true
                console.log("Redémarrer")

                secondsConvert = 0
                hours = 0
                minutes = 0
                seconds = 0

                timer.textContent = format2(hours) + ":" + format2(minutes) + ":" + format2(seconds)

            })
        </script>
    </body>

</html>
